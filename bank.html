<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Банк Реметии · RMT | Карта | Переводы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e8efe0 0%, #c8d4bb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .flag-bar {
            height: 6px;
            background: linear-gradient(90deg, #2b7a3e 33%, #f4c542 34%, #f4c542 66%, #9b2c2c 67%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .container {
            max-width: 550px;
            margin: 50px auto 20px;
        }

        .card {
            background: white;
            border-radius: 48px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2b7a3e;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 5px;
        }

        .sub {
            text-align: center;
            color: #6a7c5c;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3e2b;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #cbdcc0;
            border-radius: 60px;
            font-size: 1rem;
            background: #fefef7;
        }

        input:focus {
            outline: none;
            border-color: #2b7a3e;
            box-shadow: 0 0 0 3px rgba(43,122,62,0.2);
        }

        button {
            background: #2b7a3e;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.15s;
        }

        button:hover {
            background: #1f5c2e;
            transform: scale(0.98);
        }

        button.secondary {
            background: #f4c542;
            color: #2d2b1f;
        }

        button.danger {
            background: #9b2c2c;
        }

        .balance-card {
            background: linear-gradient(135deg, #2b7a3e, #1e562c);
            border-radius: 32px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-amount {
            font-size: 3rem;
            font-weight: 800;
        }

        .card-info {
            background: #f0f4ec;
            border-radius: 28px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .card-number {
            font-family: monospace;
            font-size: 1.3rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: #2b7a3e;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: #e2ecd9;
            color: #2d3e2b;
            padding: 12px;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #2b7a3e;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .history-item {
            border-bottom: 1px solid #e0ebd6;
            padding: 12px 0;
            font-size: 0.9rem;
        }

        .positive {
            color: #2b7a3e;
            font-weight: bold;
        }

        .negative {
            color: #9b2c2c;
            font-weight: bold;
        }

        .click-area {
            text-align: center;
            margin: 20px 0;
        }

        .click-button {
            background: radial-gradient(circle at 30% 20%, #f4c542, #d4a017);
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.05s linear;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #b8860b;
        }

        .click-button:active {
            transform: scale(0.96);
        }

        .click-count {
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .upgrade-item {
            background: #f8faf5;
            border-radius: 60px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn {
            width: auto;
            padding: 8px 18px;
            font-size: 0.8rem;
        }

        .passive-box {
            background: #f0f4ec;
            border-radius: 28px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .nav-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #9b2c2c;
            text-decoration: none;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #5a6e4a;
            font-size: 0.75rem;
        }

        .floating-number {
            position: fixed;
            font-weight: bold;
            font-size: 1.3rem;
            pointer-events: none;
            z-index: 999;
            transition: all 0.5s ease-out;
        }

        @media (max-width: 500px) {
            .click-button {
                width: 130px;
                height: 130px;
                font-size: 2rem;
            }
            .balance-amount {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
<div class="flag-bar"></div>
<div class="container" id="app"></div>
<div class="footer">Центральный банк Республики Реметия · Переводы по номеру карты</div>

<script>
    // ========== ХРАНИЛИЩЕ ==========
    const STORAGE_USERS = 'remetia_bank_users';
    const STORAGE_SESSION = 'remetia_bank_session';

    // Генерация номера карты (16 цифр с пробелами)
    function generateCardNumber() {
        const parts = [];
        for (let i = 0; i < 4; i++) {
            parts.push(Math.floor(Math.random() * 9000 + 1000));
        }
        return parts.join(' ');
    }

    // Получение всех пользователей
    function getUsers() {
        const raw = localStorage.getItem(STORAGE_USERS);
        if (!raw) {
            const defaultUsers = [
                {
                    id: 'u1',
                    username: 'Арина_Светлова',
                    password: 'president2025',
                    cardNumber: '1111 2222 3333 4444',
                    balance: 5000,
                    clickPower: 1,
                    upgrades: { auto1: 0, auto2: 0, auto3: 0, auto4: 0, clickBonus: 0 },
                    transactions: [{ date: new Date().toISOString(), type: 'bonus', desc: 'Стартовый бонус', amount: 5000 }]
                },
                {
                    id: 'u2',
                    username: 'Гражданин_Реметии',
                    password: 'remetia123',
                    cardNumber: '5555 6666 7777 8888',
                    balance: 1200,
                    clickPower: 1,
                    upgrades: { auto1: 0, auto2: 0, auto3: 0, auto4: 0, clickBonus: 0 },
                    transactions: [{ date: new Date().toISOString(), type: 'bonus', desc: 'Стартовый бонус', amount: 1200 }]
                },
                {
                    id: 'u3',
                    username: 'Генерал_Ветер',
                    password: 'army2026',
                    cardNumber: '9999 0000 1111 2222',
                    balance: 3400,
                    clickPower: 1,
                    upgrades: { auto1: 0, auto2: 0, auto3: 0, auto4: 0, clickBonus: 0 },
                    transactions: [{ date: new Date().toISOString(), type: 'bonus', desc: 'Стартовый бонус', amount: 3400 }]
                }
            ];
            localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        return JSON.parse(raw);
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function getSession() {
        return JSON.parse(localStorage.getItem(STORAGE_SESSION));
    }

    function setSession(userId, username) {
        localStorage.setItem(STORAGE_SESSION, JSON.stringify({ userId, username }));
    }

    function clearSession() {
        localStorage.removeItem(STORAGE_SESSION);
    }

    function getCurrentUser() {
        const sess = getSession();
        if (!sess) return null;
        const users = getUsers();
        const user = users.find(u => u.id === sess.userId);
        if (user && !user.cardNumber) {
            user.cardNumber = generateCardNumber();
            updateUser(user);
        }
        return user;
    }

    function updateUser(updatedUser) {
        const users = getUsers();
        const idx = users.findIndex(u => u.id === updatedUser.id);
        if (idx !== -1) {
            users[idx] = updatedUser;
            saveUsers(users);
        }
    }

    // ========== ПЕРЕВОД ПО НОМЕРУ КАРТЫ ==========
    function transferByCard(sender, targetCardNumber, amount) {
        if (amount <= 0) return { success: false, error: 'Сумма должна быть больше 0' };
        if (sender.balance < amount) return { success: false, error: 'Недостаточно средств' };
        
        const users = getUsers();
        const recipient = users.find(u => u.cardNumber === targetCardNumber);
        if (!recipient) return { success: false, error: 'Карта получателя не найдена' };
        if (recipient.id === sender.id) return { success: false, error: 'Нельзя перевести на свою карту' };
        
        sender.balance = parseFloat((sender.balance - amount).toFixed(2));
        recipient.balance = parseFloat((recipient.balance + amount).toFixed(2));
        
        const now = new Date().toISOString();
        sender.transactions = sender.transactions || [];
        recipient.transactions = recipient.transactions || [];
        
        sender.transactions.unshift({ 
            date: now, 
            type: 'out', 
            to: recipient.username, 
            toCard: recipient.cardNumber, 
            amount: -amount 
        });
        
        recipient.transactions.unshift({ 
            date: now, 
            type: 'in', 
            from: sender.username, 
            fromCard: sender.cardNumber, 
            amount: +amount 
        });
        
        saveUsers(users);
        return { success: true, newBalance: sender.balance };
    }

    // ========== КЛИКЕР ==========
    const upgradesConfig = [
        { id: 'auto1', name: '🤖 Сборщик', basePrice: 50, income: 1, desc: '+1 RMT/сек' },
        { id: 'auto2', name: '🏭 Завод', basePrice: 300, income: 5, desc: '+5 RMT/сек' },
        { id: 'auto3', name: '🌾 Агрокомплекс', basePrice: 1200, income: 20, desc: '+20 RMT/сек' },
        { id: 'auto4', name: '💎 Банк', basePrice: 5000, income: 80, desc: '+80 RMT/сек' },
        { id: 'clickBonus', name: '✨ Сила клика', basePrice: 100, income: 0, clickBonus: 1, desc: '+1 за клик' }
    ];

    function recalcClickPower(user) {
        let power = 1;
        power += (user.upgrades?.clickBonus || 0) * 1;
        user.clickPower = power;
        return power;
    }

    function buyUpgrade(user, upgradeId) {
        const upgrade = upgradesConfig.find(u => u.id === upgradeId);
        if (!upgrade) return false;
        
        const currentCount = user.upgrades?.[upgradeId] || 0;
        let price = Math.floor(upgrade.basePrice * (1 + 0.2 * currentCount));
        
        if (user.balance < price) return false;
        
        user.balance = parseFloat((user.balance - price).toFixed(2));
        if (!user.upgrades) user.upgrades = {};
        user.upgrades[upgradeId] = currentCount + 1;
        
        if (upgradeId === 'clickBonus') recalcClickPower(user);
        
        user.transactions = user.transactions || [];
        user.transactions.unshift({ 
            date: new Date().toISOString(), 
            type: 'upgrade', 
            desc: `Куплено: ${upgrade.name}`, 
            amount: -price 
        });
        
        updateUser(user);
        return true;
    }

    function clickAction(user) {
        const gain = user.clickPower || 1;
        user.balance = parseFloat((user.balance + gain).toFixed(2));
        updateUser(user);
        return gain;
    }

    function getPassiveIncome(user) {
        let income = 0;
        income += (user.upgrades?.auto1 || 0) * 1;
        income += (user.upgrades?.auto2 || 0) * 5;
        income += (user.upgrades?.auto3 || 0) * 20;
        income += (user.upgrades?.auto4 || 0) * 80;
        return income;
    }

    // ========== UI ==========
    let currentTab = 'bank';

    function showFloatingNumber(text, color, targetElement) {
        if (!targetElement) return;
        const rect = targetElement.getBoundingClientRect();
        const span = document.createElement('div');
        span.innerText = text;
        span.className = 'floating-number';
        span.style.color = color || '#2b7a3e';
        span.style.left = (rect.left + rect.width / 2) + 'px';
        span.style.top = (rect.top + rect.height / 2) + 'px';
        span.style.transform = 'translateX(-50%)';
        document.body.appendChild(span);
        setTimeout(() => {
            span.style.opacity = '0';
            span.style.transform = 'translateX(-50%) translateY(-50px)';
        }, 10);
        setTimeout(() => span.remove(), 500);
    }

    function render() {
        const container = document.getElementById('app');
        const user = getCurrentUser();
        
        if (!user) {
            container.innerHTML = renderLogin();
            attachLoginEvents();
            return;
        }
        
        container.innerHTML = renderProfile(user);
        attachProfileEvents();
        attachClickerEvents();
    }

    function renderLogin() {
        return `
            <div class="card">
                <h1>🏦 Банк Реметии</h1>
                <div class="sub">Вход в личный кабинет</div>
                <div id="loginForm">
                    <div class="input-group">
                        <label>👤 Логин</label>
                        <input type="text" id="loginUsername" placeholder="Арина_Светлова">
                    </div>
                    <div class="input-group">
                        <label>🔒 Пароль</label>
                        <input type="password" id="loginPassword" placeholder="••••••">
                    </div>
                    <button id="doLoginBtn">Войти</button>
                </div>
                <hr style="margin: 25px 0; border-color: #e0ebd6;">
                <div id="regForm">
                    <div class="input-group">
                        <label>✨ Новый логин</label>
                        <input type="text" id="regUsername" placeholder="Придумайте логин">
                    </div>
                    <div class="input-group">
                        <label>🔐 Пароль</label>
                        <input type="password" id="regPassword" placeholder="Минимум 3 символа">
                    </div>
                    <button id="doRegBtn" class="secondary">Создать гражданина (+100 RMT)</button>
                </div>
                <div style="margin-top: 20px; font-size: 0.7rem; color: #6a7c5c; text-align: center;">
                    <strong>Тестовые аккаунты:</strong><br>
                    Арина_Светлова / president2025<br>
                    Гражданин_Реметии / remetia123<br>
                    Генерал_Ветер / army2026
                </div>
            </div>
        `;
    }

    function attachLoginEvents() {
        document.getElementById('doLoginBtn')?.addEventListener('click', () => {
            const username = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === pwd);
            if (user) {
                setSession(user.id, user.username);
                render();
            } else {
                alert('Неверный логин или пароль');
            }
        });
        
        document.getElementById('doRegBtn')?.addEventListener('click', () => {
            const username = document.getElementById('regUsername').value.trim();
            const pwd = document.getElementById('regPassword').value;
            if (username.length < 3 || pwd.length < 3) {
                alert('Логин и пароль не менее 3 символов');
                return;
            }
            const users = getUsers();
            if (users.find(u => u.username === username)) {
                alert('Логин занят');
                return;
            }
            
            const newUser = {
                id: 'u' + Date.now(),
                username: username,
                password: pwd,
                cardNumber: generateCardNumber(),
                balance: 100,
                clickPower: 1,
                upgrades: { auto1: 0, auto2: 0, auto3: 0, auto4: 0, clickBonus: 0 },
                transactions: [{ date: new Date().toISOString(), type: 'bonus', desc: 'Регистрационный бонус', amount: 100 }]
            };
            users.push(newUser);
            saveUsers(users);
            setSession(newUser.id, newUser.username);
            render();
        });
    }

    function renderProfile(user) {
        const passiveIncome = getPassiveIncome(user);
        const cardNumber = user.cardNumber || generateCardNumber();
        
        return `
            <div class="card">
                <h1>🇷🇪 ${user.username}</h1>
                <div class="sub">Личный кабинет</div>
                <div class="balance-card">
                    <div style="font-size: 0.8rem;">💰 Баланс</div>
                    <div class="balance-amount" id="balanceDisplay">${user.balance.toFixed(2)} RMT</div>
                </div>
                <div class="card-info">
                    <div style="font-size: 0.7rem;">💳 Номер карты</div>
                    <div class="card-number" id="cardNumberDisplay">${cardNumber}</div>
                </div>
                <div class="tabs">
                    <div class="tab-btn ${currentTab === 'bank' ? 'active' : ''}" data-tab="bank">🏦 Переводы</div>
                    <div class="tab-btn ${currentTab === 'clicker' ? 'active' : ''}" data-tab="clicker">🖱️ Кликер</div>
                    <div class="tab-btn ${currentTab === 'history' ? 'active' : ''}" data-tab="history">📜 История</div>
                </div>
                <div id="tabBank" class="tab-content ${currentTab === 'bank' ? 'active' : ''}">
                    <div class="input-group">
                        <label>💳 Номер карты получателя</label>
                        <input type="text" id="transferCard" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="input-group">
                        <label>💰 Сумма (RMT)</label>
                        <input type="number" id="transferAmount" placeholder="0">
                    </div>
                    <button id="doTransferBtn">Перевести</button>
                </div>
                <div id="tabClicker" class="tab-content ${currentTab === 'clicker' ? 'active' : ''}">
                    <div class="click-area">
                        <div class="click-button" id="clickButton">
                            🏛️
                            <span class="click-count">+${user.clickPower} RMT</span>
                        </div>
                    </div>
                    <div class="passive-box">🔄 Пассивный доход: <strong>${passiveIncome} RMT/сек</strong></div>
                    <div id="upgradesList"></div>
                </div>
                <div id="tabHistory" class="tab-content ${currentTab === 'history' ? 'active' : ''}">
                    ${user.transactions && user.transactions.length > 0 ? 
                        user.transactions.slice(0, 15).map(tx => `
                            <div class="history-item">
                                ${tx.type === 'out' ? `➡️ Перевод ${-tx.amount} RMT → ${tx.to}` :
                                  tx.type === 'in' ? `⬅️ Получено +${tx.amount} RMT от ${tx.from}` :
                                  tx.type === 'upgrade' ? `📈 ${tx.desc} (${-tx.amount} RMT)` :
                                  `🎁 ${tx.desc} +${tx.amount} RMT`}
                                <br><span style="font-size: 0.65rem;">${new Date(tx.date).toLocaleString()}</span>
                            </div>
                        `).join('') 
                    : '<div class="history-item">Нет операций</div>'}
                </div>
                <button id="logoutBtn" class="danger">🚪 Выйти</button>
                <a href="index.html" class="nav-home">← На главную</a>
            </div>
        `;
    }

    function attachProfileEvents() {
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                render();
            });
        });
        
        // Перевод
        document.getElementById('doTransferBtn')?.addEventListener('click', () => {
            const card = document.getElementById('transferCard').value.trim();
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const currentUser = getCurrentUser();
            
            if (!currentUser) return;
            if (!card || isNaN(amount)) {
                alert('Введите номер карты и сумму');
                return;
            }
            
            const result = transferByCard(currentUser, card, amount);
            if (result.success) {
                alert(`✅ Переведено ${amount} RMT на карту ${card}`);
                render();
            } else {
                alert(`❌ ${result.error}`);
            }
        });
        
        // Выход
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            clearSession();
            render();
        });
    }

    function attachClickerEvents() {
        const clickBtn = document.getElementById('clickButton');
        if (clickBtn) {
            const newBtn = clickBtn.cloneNode(true);
            clickBtn.parentNode.replaceChild(newBtn, clickBtn);
            
            newBtn.addEventListener('click', (e) => {
                const currentUser = getCurrentUser();
                if (currentUser) {
                    const gain = clickAction(currentUser);
                    const balanceSpan = document.getElementById('balanceDisplay');
                    if (balanceSpan) balanceSpan.innerText = currentUser.balance.toFixed(2) + ' RMT';
                    const countSpan = newBtn.querySelector('.click-count');
                    if (countSpan) countSpan.innerText = `+${currentUser.clickPower} RMT`;
                    showFloatingNumber(`+${gain} RMT`, '#2b7a3e', newBtn);
                }
            });
        }
        
        const upgradesContainer = document.getElementById('upgradesList');
        if (upgradesContainer) {
            const currentUser = getCurrentUser();
            if (currentUser) {
                upgradesContainer.innerHTML = '';
                for (const up of upgradesConfig) {
                    const count = currentUser.upgrades?.[up.id] || 0;
                    const price = Math.floor(up.basePrice * (1 + 0.2 * count));
                    const canBuy = currentUser.balance >= price;
                    const div = document.createElement('div');
                    div.className = 'upgrade-item';
                    div.innerHTML = `
                        <div><strong>${up.name}</strong> ${count > 0 ? `+${count}` : ''}<br><span style="font-size:0.7rem;">${up.desc}</span></div>
                        <div><div style="font-size:0.8rem;">${price} RMT</div><button class="upgrade-btn" data-id="${up.id}" ${!canBuy ? 'disabled' : ''}>Купить</button></div>
                    `;
                    upgradesContainer.appendChild(div);
                }
                
                document.querySelectorAll('.upgrade-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const currentUser = getCurrentUser();
                        if (currentUser && buyUpgrade(currentUser, btn.dataset.id)) {
                            render();
                        } else {
                            alert('Не хватает средств');
                        }
                    });
                });
            }
        }
    }

    // Пассивный доход
    setInterval(() => {
        const user = getCurrentUser();
        if (user) {
            const income = getPassiveIncome(user);
            if (income > 0) {
                user.balance = parseFloat((user.balance + income).toFixed(2));
                updateUser(user);
                const balanceSpan = document.getElementById('balanceDisplay');
                if (balanceSpan) balanceSpan.innerText = user.balance.toFixed(2) + ' RMT';
            }
        }
    }, 1000);

    render();
</script>
</body>
</html>
